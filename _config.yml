faq_en:
  - question: "What is Sbobinator?"
    answer: "A local-first transcription stack for Italian audio and video. NVIDIA NeMo Parakeet runs on your hardware, jobs are tracked in a durable queue with history, and you export plain text and SRT subtitles. LLM summaries are strictly optional."
  - question: "Does my audio get uploaded to the cloud?"
    answer: "Not for transcription. ASR inference stays on your machine — models are downloaded once (~2.5 GB) and cached locally. Cloud APIs are only invoked if you explicitly enable LLM summaries with your own keys."
  - question: "Which file formats are supported?"
    answer: "Common audio and video: MP4, MKV, MOV, WAV, MP3, M4A, and more. ffmpeg extracts and normalizes audio automatically from video containers."
  - question: "Do I need Internet after setup?"
    answer: "Only for the initial model download and optional updates. Day-to-day transcription works offline. Internet returns only when you choose a cloud LLM provider for summaries."
  - question: "Can I use Sbobinator without Docker?"
    answer: "Yes. On Windows: run python scripts/install_local.py, python scripts/download_model.py, then start.bat → http://localhost:8501. Linux native install is also supported via pip."
  - question: "How does the job queue work?"
    answer: "Upload one or many files in the web UI. Each job is stored in SQLite with live HTMX progress. A background worker processes the FIFO queue. Browse history at /jobs, open /jobs/{id} for detail, reprocess or delete entries. Jobs survive browser close and worker recovery handles crashes."
  - question: "How do LLM summaries work?"
    answer: "Opt-in only. Configure providers at /settings/summary — DeepSeek, OpenAI, Claude, Gemini, Kimi via API, or download Qwen for fully offline summaries (RAM ≥ 16 GB). Executive and detailed modes adapt output to meetings, interviews, or long-form content."
  - question: "What hardware do I need?"
    answer: "Python 3.12+, ffmpeg, ~2.5 GB disk for Parakeet. CPU works; NVIDIA GPU speeds up ASR. For local Qwen summaries plan 16 GB+ RAM. See the MkDocs hardware guide for full tables."
  - question: "Why does it process one file at a time?"
    answer: "The worker runs jobs sequentially to keep RAM predictable — NeMo and optional LLM models are heavy. You can still queue many files, close the browser, and come back later."
  - question: "Can I use only the CLI?"
    answer: "Yes. sbobina transcribe video.mp4 -o data/output for one-shot runs, sbobina ui for the web interface, sbobina worker for a headless queue processor."
  - question: "How do I deploy on a mini PC?"
    answer: "Docker Compose on Linux packages UI + worker. Default mapping 8502:8501. The ASR model can be baked into the image; job data persists on a host volume under data/."
  - question: "Is it open source?"
    answer: "Proprietary license (Antonio Trento): free for personal and non-commercial use. Commercial deployment requires a license. Full source is on GitHub so you can audit what runs on your machine."

faq_it:
  - question: "Cos'è Sbobinator?"
    answer: "Uno stack di trascrizione local-first per audio e video in italiano. NVIDIA NeMo Parakeet gira sul tuo hardware, i job sono tracciati in una coda resiliente con cronologia, ed esporti testo piano e sottotitoli SRT. I riassunti LLM sono strettamente opzionali."
  - question: "I miei audio vengono caricati sul cloud?"
    answer: "No per la trascrizione. L'inferenza ASR resta sulla tua macchina — i modelli si scaricano una volta (~2,5 GB) e restano in cache locale. Le API cloud partono solo se attivi esplicitamente i riassunti LLM con le tue chiavi."
  - question: "Quali formati supporta?"
    answer: "Audio e video comuni: MP4, MKV, MOV, WAV, MP3, M4A e altri. ffmpeg estrae e normalizza l'audio automaticamente dai container video."
  - question: "Serve Internet dopo l'installazione?"
    answer: "Solo per il download iniziale dei modelli e aggiornamenti opzionali. La trascrizione quotidiana funziona offline. Internet serve di nuovo solo se scegli un provider cloud per i riassunti."
  - question: "Posso usare Sbobinator senza Docker?"
    answer: "Sì. Su Windows: python scripts/install_local.py, python scripts/download_model.py, poi start.bat → http://localhost:8501. Su Linux anche installazione nativa via pip."
  - question: "Come funziona la coda job?"
    answer: "Carichi uno o più file dalla web UI. Ogni job è salvato in SQLite con progress live via HTMX. Un worker in background elabora la coda FIFO. Cronologia su /jobs, dettaglio su /jobs/{id}, riprocessa o elimina. I job sopravvivono alla chiusura del browser; il recovery gestisce i crash."
  - question: "Come funzionano i riassunti LLM?"
    answer: "Solo opt-in. Configura i provider in /settings/summary — DeepSeek, OpenAI, Claude, Gemini, Kimi via API, oppure scarica Qwen per riassunti offline (RAM ≥ 16 GB). Modalità executive e detailed per riunioni, interviste o contenuti lunghi."
  - question: "Che hardware serve?"
    answer: "Python 3.12+, ffmpeg, ~2,5 GB disco per Parakeet. Funziona su CPU; GPU NVIDIA accelera l'ASR. Per Qwen locale pianifica 16 GB+ RAM. Vedi la guida hardware in MkDocs per le tabelle complete."
  - question: "Perché elabora un file alla volta?"
    answer: "Il worker processa i job in sequenza per tenere la RAM prevedibile — NeMo e i modelli LLM opzionali sono pesanti. Puoi comunque accodare molti file, chiudere il browser e tornare dopo."
  - question: "Posso usare solo la CLI?"
    answer: "Sì. sbobina transcribe video.mp4 -o data/output per run singole, sbobina ui per l'interfaccia web, sbobina worker per coda headless."
  - question: "Come deployo su un mini PC?"
    answer: "Docker Compose su Linux impacchetta UI + worker. Mapping default 8502:8501. Il modello ASR può essere nell'immagine; i dati job persistono su volume host in data/."
  - question: "È open source?"
    answer: "Licenza proprietaria (Antonio Trento): gratuita per uso personale e non commerciale. Il deploy commerciale richiede licenza. Il sorgente completo è su GitHub per verificare cosa gira sulla tua macchina."

