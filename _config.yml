faq_en:
  - question: "What does Sbobinator do for me?"
    answer: "It turns your Italian audio and video recordings into text you can read, search, and quote — plus SRT subtitle files for editing. Everything runs on your computer instead of a paid online transcription service."
  - question: "Who is it for?"
    answer: "Anyone with recordings to process: professionals with meeting notes, podcasters and YouTubers needing subtitles, journalists with interviews, students with lectures, or anyone who wants privacy and no per-minute billing."
  - question: "Is my audio sent to the internet?"
    answer: "No, not for transcription. Your files stay on your PC. The speech engine runs locally after a one-time model download (~2.5 GB). Internet is only needed if you optionally enable AI summaries with a cloud provider."
  - question: "How is this different from Otter, Google, or Rev?"
    answer: "Those services charge per minute and store your audio on their servers. Sbobinator is free for personal use, runs at home, and you keep full control of your files. You pay with disk space and CPU time — not subscriptions."
  - question: "What file types can I upload?"
    answer: "Common formats like MP4, MKV, MOV, WAV, MP3, and M4A. Video files are handled automatically — you don't need to extract audio yourself."
  - question: "Do I need to stay at the computer while it works?"
    answer: "No. Upload your file, then walk away. Sbobinator processes in the background. Come back later to download the transcript and subtitles."
  - question: "Can I get subtitles for my videos?"
    answer: "Yes. Every job can export an SRT file with timestamps, ready for Premiere, DaVinci Resolve, YouTube, or any subtitle-compatible tool."
  - question: "What about AI summaries?"
    answer: "Optional. If you want a short recap of a long meeting, turn summaries on in settings. You can use a cloud AI with your own API key, or a local model for more privacy. Transcription works fine without summaries."
  - question: "Is it really free?"
    answer: "Yes for personal and non-commercial use. You need a Windows or Linux PC with enough disk and RAM. Commercial use (businesses, agencies) requires a license — see the docs."
  - question: "How hard is installation?"
    answer: "On Windows: install Python dependencies, download the speech model once, run start.bat, open localhost:8501 in your browser. Step-by-step guide in the documentation."

faq_it:
  - question: "Cosa mi fa Sbobinator in pratica?"
    answer: "Trasforma le tue registrazioni audio e video in italiano in testo leggibile e ricercabile — più file SRT per i sottotitoli. Tutto gira sul tuo computer invece che su un servizio online a pagamento al minuto."
  - question: "Per chi è pensato?"
    answer: "Per chi ha registrazioni da elaborare: professionisti con riunioni, podcaster e YouTuber che servono sottotitoli, giornalisti con interviste, studenti con lezioni, o chiunque voglia privacy e niente abbonamenti al minuto."
  - question: "I miei audio finiscono su internet?"
    answer: "No, per la trascrizione. I file restano sul PC. Il motore vocale gira in locale dopo un download una tantum del modello (~2,5 GB). Internet serve solo se attivi opzionalmente i riassunti AI con un provider cloud."
  - question: "In cosa differisce da Otter, Google o Rev?"
    answer: "Quei servizi costano al minuto e tengono l'audio sui loro server. Sbobinator è gratuito per uso personale, gira a casa tua e i file restano tuoi. Paghi con spazio disco e tempo CPU — non con abbonamenti."
  - question: "Che file posso caricare?"
    answer: "Formati comuni: MP4, MKV, MOV, WAV, MP3, M4A. I video sono gestiti automaticamente — non devi estrarre l'audio a mano."
  - question: "Devo restare al computer mentre lavora?"
    answer: "No. Carichi il file e vai via. Sbobinator elabora in background. Torni dopo per scaricare trascrizione e sottotitoli."
  - question: "Posso avere i sottotitoli per i miei video?"
    answer: "Sì. Ogni job può esportare un file SRT con timestamp, pronto per Premiere, DaVinci, YouTube o qualsiasi tool che accetta sottotitoli."
  - question: "E i riassunti con l'AI?"
    answer: "Opzionali. Se vuoi un riepilogo di una riunione lunga, attiva i riassunti nelle impostazioni. Puoi usare un'AI cloud con la tua chiave, o un modello locale per più privacy. La trascrizione funziona benissimo anche senza."
  - question: "È davvero gratuito?"
    answer: "Sì per uso personale e non commerciale. Serve un PC Windows o Linux con disco e RAM sufficienti. L'uso commerciale (aziende, agenzie) richiede licenza — vedi documentazione."
  - question: "Quanto è difficile installarlo?"
    answer: "Su Windows: installi le dipendenze Python, scarichi il modello vocale una volta, lanci start.bat, apri localhost:8501 nel browser. Guida passo-passo nella documentazione."

