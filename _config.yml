faq_en:
  - question: "I have a recording right now. What do I get if I install tonight?"
    answer: "You upload a real file from your week — a meeting, episode, interview, or lecture — and receive readable Italian text plus optional subtitle files. Marco uses it for follow-up emails, Giulia for publishing workflows, Luca for quote checks, Sara for exam revision. The goal is not to explore software; it is to turn audio you already have into something you can work with tomorrow morning."
  - question: "I'm not technical. Will I get stuck during setup?"
    answer: "That is the most common fear, and it is valid. Follow the quickstart once: install dependencies, download the speech model a single time, launch the app, open it in your browser. If something fails, the docs walk through each step with common fixes. Most adopters know within one evening whether their PC can run it — without committing to a subscription."
  - question: "Why not just use Otter, Google, or a per-minute website?"
    answer: "Because those paths charge by the minute, require uploads, and keep your audio on someone else's infrastructure. If your content is client calls, unreleased episodes, or sensitive interviews, that trade-off feels wrong quickly. Sbobinator is for people who prefer paying with disk space and patience on their own machine — not with recurring bills and account lock-in."
  - question: "Will Italian quality be good enough for real work?"
    answer: "The honest answer is: test your own voice, your own microphone, your own room. Italian is the primary focus, but accents, overlap, and background noise always matter. Run a 10–20 minute sample you already know well; if the output saves you time versus manual typing, you have your answer. No marketing page replaces your specific recording."
  - question: "Can I leave while a long file processes?"
    answer: "Yes. Upload, confirm it started, then close the browser tab if you need to. Come back later to download the transcript and subtitles. This matters for Giulia's 45-minute episodes and Marco's workshop recordings — you should not babysit a progress bar during your workday."
  - question: "Is it really free? What's the catch?"
    answer: "For personal and non-commercial use, there is no timer and no credit card. The catch is honest: you need a capable PC, a one-time model download, and you do the installation yourself. Businesses need a commercial license. There is no hidden cloud bill for transcription itself."
  - question: "My files are confidential. Who sees them?"
    answer: "For transcription, the workflow is designed to keep files on your computer. That is why consultants, journalists, and creators who distrust upload-based services adopt it. Optional AI summaries are separate — you only enable them if you choose a provider and accept that step."
  - question: "What formats can I throw at it?"
    answer: "The recordings you already have: video calls saved as MP4, phone memos, podcast WAV exports, lecture captures, MKV screen recordings. You do not need to pre-process audio manually for normal use cases."
  - question: "Do I need summaries and AI extras?"
    answer: "No. Many adopters only want the transcript and SRT subtitles. Summaries are for when a two-hour session needs a short recap — enable them only if that saves you time. Starting simple reduces friction and gets you to a first success faster."
  - question: "What should I do in the first 30 minutes after install?"
    answer: "Pick one file you care about — not a stress test, a real one. Upload it, let it finish, read the output, search for a phrase you remember speaking. If that moment clicks, queue the rest of your backlog. Adoption is a behavior change, not a feature tour."

faq_it:
  - question: "Ho una registrazione adesso. Cosa ottengo se installo stasera?"
    answer: "Carichi un file vero della tua settimana — riunione, episodio, intervista o lezione — e ricevi testo italiano leggibile più eventuali sottotitoli. Marco lo usa per email di follow-up, Giulia per la pipeline di pubblicazione, Luca per verificare citazioni, Sara per ripassare gli esami. L'obiettivo non è esplorare software; è trasformare audio che hai già in qualcosa su cui lavori domani mattina."
  - question: "Non sono tecnico. Rischio di bloccarmi durante l'installazione?"
    answer: "È la paura più comune, ed è legittima. Segui la quickstart una volta: installi le dipendenze, scarichi il modello vocale una sola volta, avvii l'app, la apri nel browser. Se qualcosa fallisce, la documentazione spiega ogni passo con fix comuni. La maggior parte capisce entro una sera se il proprio PC regge — senza abbonamenti."
  - question: "Perché non usare Otter, Google o un sito a pagamento al minuto?"
    answer: "Perché quei percorsi costano al minuto, richiedono upload e tengono l'audio su infrastrutture altrui. Se i tuoi contenuti sono call con clienti, episodi non pubblicati o interviste sensibili, il compromesso stanca in fretta. Sbobinator è per chi preferisce pagare con spazio disco e pazienza sulla propria macchina — non con bollette ricorrenti."
  - question: "La qualità in italiano basta per lavoro vero?"
    answer: "La risposta onesta è: prova la tua voce, il tuo microfono, la tua stanza. L'italiano è il focus principale, ma accenti, sovrapposizioni e rumore contano sempre. Fai un campione da 10–20 minuti che conosci bene; se l'output ti fa risparmiare tempo rispetto alla battitura manuale, hai la risposta. Nessuna landing page sostituisce la tua registrazione specifica."
  - question: "Posso andare via mentre elabora un file lungo?"
    answer: "Sì. Carichi, verifichi che sia partito, poi puoi chiudere il browser. Torni dopo per scaricare trascrizione e sottotitoli. Conta per gli episodi da 45 minuti di Giulia e le registrazioni di Marco — non dovresti restare davanti a una barra di avanzamento tutto il giorno."
  - question: "È davvero gratis? Qual è il trucco?"
    answer: "Per uso personale e non commerciale non c'è timer né carta di credito. Il trucco è onesto: serve un PC capace, un download iniziale del modello, e installi tu. Le aziende necessitano licenza commerciale. Non c'è bolletta cloud nascosta per la trascrizione."
  - question: "I miei file sono riservati. Chi li vede?"
    answer: "Per la trascrizione, il flusso è pensato per tenere i file sul tuo computer. Per questo consulenti, giornalisti e creator che non si fidano dei servizi upload lo adottano. I riassunti AI sono un passo separato — li attivi solo se scegli un provider e accetti quel compromesso."
  - question: "Che formati posso caricare?"
    answer: "Le registrazioni che hai già: call salvate in MP4, memo del telefono, export WAV di podcast, lezioni registrate, MKV di schermo. Per l'uso normale non devi preparare l'audio a mano."
  - question: "Mi servono riassunti e extra AI?"
    answer: "No. Molti adottanti vogliono solo trascrizione e SRT. I riassunti servono quando due ore di riunione richiedono una sintesi — attivali solo se ti fanno risparmiare tempo. Partire semplice riduce attrito e porta al primo successo più in fretta."
  - question: "Cosa faccio nei primi 30 minuti dopo l'installazione?"
    answer: "Scegli un file che ti importa — non uno stress test, uno vero. Caricalo, attendi, leggi l'output, cerca una frase che ricordi di aver detto. Se quel momento funziona, accoda il resto del backlog. L'adozione è un cambio di abitudine, non un tour delle funzioni."

