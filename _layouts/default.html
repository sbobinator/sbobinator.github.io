<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}" class="scroll-smooth">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/x-icon" href="/assets/images/logo/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/images/logo/logo-transparent.png">
    {% include seo.html %}
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                        display: ['Space Grotesk', 'Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            purple: '#0ea5e9', // Changed to Sky Blue for Crypto
                            purpleLight: '#38bdf8',
                            pink: '#10b981', // Changed to Emerald Green for Crypto
                            pinkLight: '#34d399',
                            gold: '#F59E0B',
                            dark: '#0D0D0F',
                            surface: '#18181B',
                            muted: '#71717A',
                            // keep compat aliases
                            blue: '#0ea5e9',
                            green: '#10b981',
                            black: '#0D0D0F',
                            gray: '#18181B',
                        }
                    },
                    borderRadius: {
                        'pill': '9999px',
                        'xl': '0.25rem',
                        '2xl': '0.5rem',
                        '3xl': '0.75rem',
                        '4xl': '1rem',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'marquee': 'marquee 25s linear infinite',
                        'glow-pulse': 'glowPulse 3s ease-in-out infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        marquee: {
                            '0%': { transform: 'translateX(0%)' },
                            '100%': { transform: 'translateX(-100%)' },
                        },
                        glowPulse: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(14, 165, 233, 0.4)' },
                            '50%': { boxShadow: '0 0 60px rgba(14, 165, 233, 0.8), 0 0 120px rgba(16, 185, 129, 0.3)' },
                        }
                    }
                },
            },
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
        }

        /* Scroll Reveal Classes */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Staggered delays */
        .delay-100 {
            transition-delay: 100ms;
        }

        .delay-200 {
            transition-delay: 200ms;
        }

        .delay-300 {
            transition-delay: 300ms;
        }

        .delay-400 {
            transition-delay: 400ms;
        }

        /* Custom Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-float-delayed {
            animation: float 6s ease-in-out 3s infinite;
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-slow {
            animation: spin-slow 12s linear infinite;
        }

        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }

        /* Neon glow utilities */
        .glow-purple {
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3), inset 0 0 10px rgba(14, 165, 233, 0.1);
        }

        .glow-pink {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3), inset 0 0 10px rgba(16, 185, 129, 0.1);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        /* Noise overlay */
        .noise-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
        }

        /* Grid background pattern */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
        }
        .dark .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(14, 165, 233, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(14, 165, 233, 0.1) 1px, transparent 1px);
        }

        /* Gradient text */
        .gradient-text {
            background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Code block styles */
        .code-block {
            background: #0a0a0a;
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #38bdf8;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .code-block .comment {
            color: #71717a;
        }

        .code-block .cmd {
            color: #34d399;
        }

        .code-block .str {
            color: #fbbf24;
        }

        /* Accordion Styles */
        details>summary {
            list-style: none;
        }

        details>summary::-webkit-details-marker {
            display: none;
        }

        details[open] summary~* {
            animation: sweep .3s ease-in-out;
        }

        @keyframes sweep {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card hover glow */
        .card-glow {
            transition: all 0.3s ease;
            border: 1px solid rgba(14, 165, 233, 0.2);
            border-radius: 0.5rem;
        }

        .card-glow:hover {
            border-color: rgba(14, 165, 233, 0.6);
            box-shadow: inset 0 0 20px rgba(14, 165, 233, 0.05), 0 0 20px rgba(14, 165, 233, 0.2);
            transform: translateY(-2px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0D0D0F;
        }

        ::-webkit-scrollbar-thumb {
            background: #0ea5e9;
            border-radius: 0px;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {

            0%,
            20% {
                content: '.';
            }

            40% {
                content: '..';
            }

            60% {
                content: '...';
            }

            80%,
            100% {
                content: '';
            }
        }
    </style>
</head>

<body
    class="overflow-x-hidden selection:bg-brand-purple selection:text-white bg-white dark:bg-brand-dark text-gray-900 dark:text-white transition-colors duration-300">

    {% include antigravity_nav.html %}

    {{ content }}

    {% include antigravity_footer.html %}

    <script src="{{ '/assets/js/antigravity.js' | relative_url }}"></script>
</body>

</html>
